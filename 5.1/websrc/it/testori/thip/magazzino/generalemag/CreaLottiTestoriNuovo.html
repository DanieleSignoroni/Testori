<html>
<head>
</head>
<body style="margin: 0px; overflow: hidden;">
	<form name="YRichDatiCreazLottiForm">
		<table width="100%" cellspacing="0" cellpadding="0" id="emptyborder">
			<tr>
				<td><input type="hidden" name="IdAzienda" id="IdAzienda" /></td>
			</tr>
			<tr>
				<td><input type="hidden" name="ChiaveSelezionato"
					id="ChiaveSelezionato" /></td>
			</tr>
			<tr>
				<td>
					<table>
						<tr>
							<td>
								<table>
									<thead>
										<tr>
											<th><label for="IdLotto"></label></th>
											<th><label for="Quantita"></label></th>
											<th><label for="NumeroConfezioni"></label></th>
											<th><label for="NumeroRocche"></label></th>
										</tr>
									</thead>
									<tbody>
										<tr>
											<td><input type="text" id="IdLotto" name="IdLotto" /></td>
											<td><input type="text" id="Quantita" name="Quantita" /></td>
											<td><input type="text" id="NumeroConfezioni"
												name="NumeroConfezioni" /></td>
											<td><input type="text" id="NumeroRocche"
												name="NumeroRocche" /></td>
										</tr>
									</tbody>
								</table>
							</td>
						</tr>
						<tr>
							<td>
								<table>
									<tr>
										<td><label for="LottoAcquisto"></label></td>
										<td><input type="text" id="LottoAcquisto"
											name="LottoAcquisto" /></td>
									</tr>
									<tr>
										<td><label for="DataScadenza"></label></td>
										<td><input type="text" id="DataScadenza"
											name="DataScadenza" /></td>
									</tr>
									<tr>
										<td><label for="Note"></label></td>
										<td><textarea id="Note" name="Note" rows="3" cols="75"></textarea></td>
									</tr>
									<tr>
										<td>
											<button
												style="width: 125px; display: inline; margin-top: 2.5rem; margin-left: 1rem"
												name="bottoneConferma" id="bottoneConferma"
												onClick="conferma()" type="button">Conferma
												modifica</button>
										</td>
									</tr>
								</table>
							</td>
						</tr>
					</table>
				</td>
			</tr>
			<tr>
				<td style="height: 0"><span class="errorlist" /></td>
			</tr>
		</table>
	</form>
</body>
</html>
